<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ProfitShield - Login</title>
    <style>
        body { background-color: #1e1e2e; color: #cdd6f4; font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; }
        .box { background-color: #252538; padding: 30px; border-radius: 8px; border: 1px solid #45475a; width: 300px; }
        h2 { color: #89b4fa; text-align: center; margin-top: 0; }
        input[type="email"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; background-color: #313244; border: 1px solid #45475a; color: #cdd6f4; border-radius: 4px; box-sizing: border-box; }
        .btn { background-color: #89b4fa; color: #1e1e2e; width: 100%; padding: 10px; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>User Login</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>
        <p style="font-size: 12px; text-align: center; margin-top: 15px;"><a href="/register" style="color: #a6e3a1;">Don't have an account? Register</a></p>
    </div>
</body>
</html>
